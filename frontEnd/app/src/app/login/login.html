<div class="background" style="background-color: #ffffff; min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center;">
<div class="login-container" style="background-color: rgba(248, 250, 252, 0.5); padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);">
  <h2>Welcome Back</h2>

  <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

    <div class="form-group">
      <label for="identifier">Email or Username</label>
      <input
        id="identifier"
        type="text"
        [(ngModel)]="identifier"
        name="identifier"
        placeholder="Enter your email or username"
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Enter your password"
      />
    </div>

    <div class="form-group checkbox-group" (click)="$event.stopPropagation()">
      <input
        id="rememberMe"
        type="checkbox"
        [(ngModel)]="rememberMe"
        name="rememberMe"
        (click)="$event.stopPropagation()"
      />
      <label for="rememberMe" (click)="$event.stopPropagation()">Remember me</label>
    </div>

@if (errorMessage()) {
  <p class="error-message">{{ errorMessage() }}</p>
}
@if (successMessage()) {
  <p class="success-message">{{ successMessage() }}</p>
}

<button type="submit" [disabled]="isLoading()">
  {{ isLoading() ? 'Logging in...' : 'Log In' }}
</button>

  </form>

  <p class="signup-link">
    Don't have an account? <a routerLink="/signup">Sign up</a>
  </p>
</div>
</div>
