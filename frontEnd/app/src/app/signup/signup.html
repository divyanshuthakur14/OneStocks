<div style="background-color: #ffffff; min-height: 100vh; width: 100%; display: flex; align-items: center; justify-content: center; padding: 1rem 0;">
  <div class="signup-container" style="background-color: rgba(248, 250, 252, 0.5); padding: 2rem; width: 100%; max-width: 720px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);">

    <h1>Create Your Account</h1>

    <form (ngSubmit)="onSubmit()" #signupForm="ngForm">

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">

        <div class="form-group">
          <label for="username">Username</label>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Enter your username"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Enter your email"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            id="confirmPassword"
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm your password"
          />
        </div>

      </div>

      @if (errorMessage()) {
        <p class="error-message">{{ errorMessage() }}</p>
      
      }
      @if (successMessage()) {
        <p class="success-message">{{ successMessage() }}</p>
      }

      <button type="submit" [disabled]="isLoading()">
        {{ isLoading() ? 'Signing up...' : 'Sign Up' }}
      </button>

    </form>

    <p class="login-link">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
    
  </div>
</div>
