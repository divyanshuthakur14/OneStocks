<div style="background-color: #f8fafc; min-height: 100vh; overflow-y: hidden; width: 100%;  align-items: center; display: flex; justify-content: center;">
<div class="signup-container" style="background-color: #ffffff; border-radius: 12px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);">
  <h2>Create an Account</h2>

  <form (ngSubmit)="onSubmit()" #signupForm="ngForm">

    <div class="form-group">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        [(ngModel)]="username"
        name="username"
        placeholder="Enter your username"
      />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="Enter your email"
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="Enter your password"
      />
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input
        id="confirmPassword"
        type="password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        placeholder="Confirm your password"
      />
    </div>

    <div class="form-group checkbox-group">
      <input
        id="rememberMe"
        type="checkbox"
        [(ngModel)]="rememberMe"
        name="rememberMe"
      />
      <label for="rememberMe">Remember me</label>
    </div>

    <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="success-message" *ngIf="successMessage">{{ successMessage }}</p>

    <button type="submit" [disabled]="isLoading">
      {{ isLoading ? 'Signing up...' : 'Sign Up' }}
    </button>

  </form>

  <p class="login-link">
    Already have an account? <a routerLink="/login">Log in</a>
  </p>
</div>
</div>
